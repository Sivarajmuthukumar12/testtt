<div class="min-vh-100 d-flex align-items-center bg-light">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5">
        <div class="card shadow-lg border-0 rounded-4">
          <div class="card-body p-5">
            <div class="text-center mb-4">
              <i class="bi bi-shop text-danger" style="font-size:3rem"></i>
              <h3 class="fw-bold mt-2">RetailOrder</h3>
              <p class="text-muted">Sign in to your account</p>
            </div>

            @if (error) {
              <div class="alert alert-danger alert-dismissible">
                <i class="bi bi-exclamation-triangle me-2"></i>{{ error }}
              </div>
            }

            <form (ngSubmit)="login()">
              <div class="mb-3">
                <label class="form-label fw-semibold">Email Address</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                  <input type="email" class="form-control" [(ngModel)]="email" name="email"
                    placeholder="admin@retail.com" required>
                </div>
              </div>

              <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <div class="input-group">
                  <span class="input-group-text"><i class="bi bi-lock"></i></span>
                  <input type="password" class="form-control" [(ngModel)]="password" name="password"
                    placeholder="••••••••" required>
                </div>
              </div>

              <button type="submit" class="btn btn-danger w-100 py-2 fw-semibold" [disabled]="loading">
                @if (loading) {
                  <span class="spinner-border spinner-border-sm me-2"></span>Signing in...
                } @else {
                  <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                }
              </button>
            </form>

            <hr class="my-4">
            <p class="text-center text-muted mb-0">
              Don't have an account?
              <a routerLink="/register" class="text-danger fw-semibold">Register here</a>
            </p>

            <div class="mt-3 p-3 bg-light rounded">
              <small class="text-muted d-block fw-semibold mb-1">Demo Credentials:</small>
              <small class="text-muted d-block"><i class="bi bi-shield me-1"></i>Admin: admin&#64;retail.com / Admin&#64;123</small>
              <small class="text-muted d-block"><i class="bi bi-truck me-1"></i>Delivery: delivery&#64;retail.com / Delivery&#64;123</small>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
