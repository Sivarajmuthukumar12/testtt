<div class="container-fluid py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold mb-0"><i class="bi bi-tags text-danger me-2"></i>Categories</h2>
    <button class="btn btn-danger" (click)="showForm = !showForm">
      <i class="bi bi-plus-lg me-2"></i>New Category
    </button>
  </div>

  @if (successMsg) { <div class="alert alert-success">{{ successMsg }}</div> }

  @if (showForm) {
    <div class="card border-0 shadow-sm rounded-4 mb-4">
      <div class="card-body p-4">
        <h5 class="fw-bold mb-3">New Category</h5>
        @if (errorMsg) { <div class="alert alert-danger">{{ errorMsg }}</div> }
        <div class="row g-3">
          <div class="col-md-4">
            <label class="form-label fw-semibold">Name *</label>
            <input type="text" class="form-control" [(ngModel)]="form.name">
          </div>
          <div class="col-md-8">
            <label class="form-label fw-semibold">Description</label>
            <input type="text" class="form-control" [(ngModel)]="form.description">
          </div>
        </div>
        <div class="d-flex gap-2 mt-3">
          <button class="btn btn-danger" (click)="save()"><i class="bi bi-save me-2"></i>Save</button>
          <button class="btn btn-outline-secondary" (click)="showForm = false">Cancel</button>
        </div>
      </div>
    </div>
  }

  @if (loading) {
    <div class="text-center py-4"><div class="spinner-border text-danger"></div></div>
  } @else {
    <div class="row g-3">
      @for (cat of categories; track cat.id) {
        <div class="col-md-4">
          <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4 d-flex justify-content-between align-items-center">
              <div>
                <h5 class="fw-bold mb-1">{{ cat.name }}</h5>
                <p class="text-muted mb-0 small">{{ cat.description }}</p>
              </div>
              <button class="btn btn-outline-danger btn-sm" (click)="delete(cat.id)">
                <i class="bi bi-trash"></i>
              </button>
            </div>
          </div>
        </div>
      }
    </div>
  }
</div>
