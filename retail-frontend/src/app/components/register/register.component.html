<div class="min-vh-100 d-flex align-items-center bg-light py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow-lg border-0 rounded-4">
          <div class="card-body p-5">
            <div class="text-center mb-4">
              <i class="bi bi-person-plus text-danger" style="font-size:3rem"></i>
              <h3 class="fw-bold mt-2">Create Account</h3>
              <p class="text-muted">Join RetailOrder today</p>
            </div>

            @if (error) {
              <div class="alert alert-danger">
                <i class="bi bi-exclamation-triangle me-2"></i>{{ error }}
              </div>
            }

            <form (ngSubmit)="register()">
              <div class="row g-3">
                <div class="col-6">
                  <label class="form-label fw-semibold">First Name</label>
                  <input type="text" class="form-control" [(ngModel)]="model.firstName" name="firstName" required>
                </div>
                <div class="col-6">
                  <label class="form-label fw-semibold">Last Name</label>
                  <input type="text" class="form-control" [(ngModel)]="model.lastName" name="lastName" required>
                </div>
                <div class="col-12">
                  <label class="form-label fw-semibold">Email Address</label>
                  <input type="email" class="form-control" [(ngModel)]="model.email" name="email" required>
                </div>
                <div class="col-12">
                  <label class="form-label fw-semibold">Password</label>
                  <input type="password" class="form-control" [(ngModel)]="model.password" name="password"
                    placeholder="Min 6 chars, 1 uppercase, 1 number" required>
                </div>
                <div class="col-12">
                  <label class="form-label fw-semibold">Phone Number</label>
                  <input type="tel" class="form-control" [(ngModel)]="model.phoneNumber" name="phoneNumber"
                    placeholder="10-digit number" required>
                </div>
                <div class="col-12">
                  <label class="form-label fw-semibold">Delivery Address</label>
                  <textarea class="form-control" [(ngModel)]="model.address" name="address" rows="2"></textarea>
                </div>
              </div>

              <button type="submit" class="btn btn-danger w-100 py-2 fw-semibold mt-4" [disabled]="loading">
                @if (loading) {
                  <span class="spinner-border spinner-border-sm me-2"></span>Creating account...
                } @else {
                  <i class="bi bi-person-check me-2"></i>Create Account
                }
              </button>
            </form>

            <p class="text-center text-muted mt-3 mb-0">
              Already have an account?
              <a routerLink="/login" class="text-danger fw-semibold">Sign in</a>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
